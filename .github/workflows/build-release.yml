name: Build and Release APK

on:
  # 1) Manual trigger from GitHub Actions UI
  workflow_dispatch:

  # 2) Release trigger: push a version tag like v2.1.4
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Read app version from pubspec.yaml
        id: ver
        shell: bash
        run: |
          VERSION_LINE=$(grep -E '^version:' pubspec.yaml | head -n 1 | awk '{print $2}')
          # pubspec: 2.1.4+44  -> tag: v2.1.4
          VERSION_NAME=${VERSION_LINE%%+*}
          echo "version_line=$VERSION_LINE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (attach APK)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.ver.outputs.version_name) }}
          name: Unraid-APP v${{ steps.ver.outputs.version_name }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
